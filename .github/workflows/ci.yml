name: CI / CD / ML Validation / Deployment

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  # ============================================================
  # PHASE 1: CODE QUALITY & SYNTAX CHECKS
  # ============================================================
  tests:
    name: Code Quality & Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Syntax check - compile Python files
        run: |
          python -m compileall main_new_v2.py train_pipeline.py scripts

      - name: Run unit tests
        run: |
          pytest -v --tb=short

  # ============================================================
  # PHASE 2: ML PIPELINE TRAINING
  # ============================================================
  train:
    name: Train ML Models
    runs-on: ubuntu-latest
    needs: tests
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Train ML models
        run: |
          python scripts/train_models_ci.py --data energy_dataset.csv --artifacts artifacts

      - name: Upload trained artifacts
        uses: actions/upload-artifact@v4
        with:
          name: trained-models
          path: artifacts
          retention-days: 30

  # ============================================================
  # PHASE 3: DATA VALIDATION & DRIFT DETECTION
  # ============================================================
  deepchecks:
    name: DeepChecks Data & Drift Validation
    runs-on: ubuntu-latest
    needs: train
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download trained artifacts
        uses: actions/download-artifact@v4
        with:
          name: trained-models
          path: artifacts

      - name: Run data integrity & drift checks
        run: |
          python scripts/run_deepchecks.py --data energy_dataset.csv --output-dir artifacts/deepchecks --strict

      - name: Upload DeepChecks validation reports
        uses: actions/upload-artifact@v4
        with:
          name: deepchecks-reports
          path: artifacts/deepchecks
          retention-days: 30

      - name: Check validation results
        run: |
          if [ -f artifacts/deepchecks/deepchecks_summary.json ]; then
            echo "✓ DeepChecks validation completed"
          else
            echo "❌ DeepChecks validation failed"
            exit 1
          fi

  # ============================================================
  # PHASE 4: CONTAINER BUILDS
  # ============================================================
  docker-build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: tests
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build API Docker image
        run: |
          docker build -f Dockerfile -t energy-forecast-api:${{ github.sha }} .

      - name: Build Frontend Docker image
        run: |
          docker build -f app-frontend/Dockerfile -t energy-forecast-frontend:${{ github.sha }} ./app-frontend

      - name: Build summary
        run: |
          echo "✓ API image built: energy-forecast-api:${{ github.sha }}"
          echo "✓ Frontend image built: energy-forecast-frontend:${{ github.sha }}"

  # ============================================================
  # PHASE 5: DEPLOYMENT (OPTIONAL - REQUIRES CONFIG)
  # ============================================================
  deploy:
    name: Deploy to Environment
    runs-on: ubuntu-latest
    needs: [ deepchecks, docker-build ]
    if: success() && github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Deployment readiness check
        run: |
          echo "🚀 Deployment Phase"
          echo "Build: ${{ github.sha }}"
          echo "Status: All validations passed ✓"
          echo ""
          echo "To enable deployment, configure:"
          echo "  1. Docker registry (set DOCKER_REGISTRY_URL secret)"
          echo "  2. Cloud provider credentials (set DEPLOY_TOKEN secret)"
          echo "  3. Target environment (set DEPLOY_TARGET secret)"

  # ============================================================
  # PHASE 6: NOTIFICATIONS
  # ============================================================
  notify:
    name: Send Notifications
    runs-on: ubuntu-latest
    needs: [ tests, train, deepchecks, docker-build ]
    if: always()
    steps:
      - name: Prepare notification
        run: |
          STATUS=$(if [ "${{ needs.tests.result }}" == "success" ] && \
                       [ "${{ needs.train.result }}" == "success" ] && \
                       [ "${{ needs.deepchecks.result }}" == "success" ] && \
                       [ "${{ needs.docker-build.result }}" == "success" ]; then \
                     echo "✅ PASSED"; else echo "❌ FAILED"; fi)
          
          echo "Pipeline: $STATUS"
          echo "  Tests: ${{ needs.tests.result }}"
          echo "  Training: ${{ needs.train.result }}"
          echo "  Validation: ${{ needs.deepchecks.result }}"
          echo "  Docker Build: ${{ needs.docker-build.result }}"

      - name: Send Discord notification
        if: env.DISCORD_WEBHOOK_URL != ''
        run: |
          python - << 'EOF'
import json
import requests
import os

webhook_url = os.environ.get('DISCORD_WEBHOOK_URL')
if not webhook_url:
            exit(0)

payload = {
    "content": (
        "🔄 CI/CD Pipeline Results\n"
        f"Tests: ${{ needs.tests.result }}\n"
        f"Training: ${{ needs.train.result }}\n"
        f"ML Validation: ${{ needs.deepchecks.result }}\n"
        f"Docker Build: ${{ needs.docker-build.result }}\n"
        f"Commit: ${{ github.sha }}\n"
        f"Branch: ${{ github.ref_name }}"
    )
}

try:
    response = requests.post(webhook_url, json=payload)
    response.raise_for_status()
    print("✓ Discord notification sent")
except Exception as e:
    print(f"Warning: Failed to send Discord notification: {e}")
EOF
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
